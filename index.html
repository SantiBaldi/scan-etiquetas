<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCAN">
<title>Scanner Etiquetas Pallet</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242834; --border: #2e3347;
    --text: #e4e6f0; --text2: #8b8fa7;
    --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.15);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
    --orange: #f59e0b; --orange-dim: rgba(245,158,11,0.15);
    --radius: 12px;
    --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', Consolas, monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-stack); background: var(--bg); color: var(--text);
    min-height: 100dvh; padding-bottom: 30px;
    -webkit-tap-highlight-color: transparent;
    padding-top: env(safe-area-inset-top);
  }
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 800; }
  .badge {
    background: var(--accent-dim); color: var(--accent);
    font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px;
  }
  .main { padding: 14px; max-width: 650px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  /* SCAN SECTION */
  .scan-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .scan-area { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  /* CAMERA PREVIEW */
  .camera-box {
    width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 10px;
    border: 2px solid var(--border); overflow: hidden; position: relative;
  }
  .camera-box video, .camera-box img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .camera-box img.preview { object-fit: contain; }
  .camera-box .placeholder {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 13px; text-align: center; padding: 20px; line-height: 1.5;
  }
  /* Frame guide overlay */
  .guide {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .guide-box {
    width: 84%; height: 84%; border: 2px dashed rgba(255,255,255,0.35); border-radius: 8px;
  }
  /* Floating camera buttons */
  .cam-fab {
    position: absolute; width: 40px; height: 40px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
    display: none; align-items: center; justify-content: center; color: #fff; z-index: 5;
  }
  .cam-fab.show { display: flex; }
  .cam-fab svg { width: 20px; height: 20px; }
  .cam-fab:active { background: rgba(59,130,246,0.4); }
  .cam-fab.torch-on { background: rgba(245,158,11,0.8); color: #000; }
  .btn-torch { top: 10px; right: 10px; }
  .btn-import { top: 10px; left: 10px; }

  /* Processing overlay on camera */
  .cam-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.65);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 6;
  }
  .cam-overlay.show { display: flex; }
  .cam-overlay .spin {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cam-overlay .msg { color: #fff; font-size: 13px; font-weight: 600; }

  /* Action row: SCAN + SAVE */
  .top-actions { display: flex; gap: 10px; width: 100%; }
  .btn-scan {
    flex: 1; padding: 16px 10px;
    background: linear-gradient(135deg, var(--accent), #6366f1); color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.1s;
  }
  .btn-scan:active { transform: scale(0.98); opacity: 0.85; }
  .btn-scan:disabled { opacity: 0.5; pointer-events: none; }
  .btn-save {
    flex: 1; padding: 16px 10px;
    background: var(--green); color: #fff; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.1s;
  }
  .btn-save:active { transform: scale(0.98); opacity: 0.85; }
  .btn-save.editing { background: var(--accent); }
  .btn-save:disabled { opacity: 0.5; pointer-events: none; }

  .scan-status {
    width: 100%; padding: 11px 14px; background: var(--surface2); border-radius: 10px;
    font-size: 13px; font-family: var(--font-mono); color: var(--text2);
    min-height: 40px; word-break: break-all; line-height: 1.5;
  }
  .scan-status.ok    { color: var(--green); background: var(--green-dim); }
  .scan-status.err   { color: var(--red); background: var(--red-dim); }
  .scan-status.warn  { color: var(--orange); background: var(--orange-dim); }
  .scan-status.work  { color: var(--accent); background: var(--accent-dim); }

  .method-badge {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 800; margin-right: 6px; text-transform: uppercase;
  }
  .method-badge.barcode { background: var(--green); color: #fff; }
  .method-badge.ocr     { background: var(--orange); color: #000; }
  .method-badge.mixed   { background: var(--accent); color: #fff; }

  .hidden-input { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }

  /* FORM CARD */
  .form-card {
    background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .form-row { display: grid; gap: 10px; }
  .form-row.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .form-row.cols-1 { grid-template-columns: 1fr; }

  .field label {
    display: block; font-size: 11px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.75px; color: var(--text2); margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 12px 10px;
    background: var(--bg); border: 2px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 18px; font-weight: 700; text-align: center;
    outline: none; transition: border-color 0.2s, background 0.2s;
    font-family: var(--font-mono);
  }
  .field input:focus { border-color: var(--accent); }
  .field input.filled { border-color: var(--green); background: var(--green-dim); }
  .field input.filled-ocr { border-color: var(--orange); background: var(--orange-dim); }
  .field input.flash { animation: flashGreen 0.5s ease; }
  @keyframes flashGreen { 0% { background: rgba(34,197,94,0.5); } 100% { background: var(--green-dim); } }

  .form-actions { display: grid; grid-template-columns: 1fr; margin-top: 4px; }
  .btn {
    padding: 14px 18px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s;
  }
  .btn:active { opacity: 0.8; }
  .btn-clear  { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-export { background: var(--accent); color: #fff; }
  .btn-danger { background: var(--red-dim); color: var(--red); }

  /* TABLE */
  .table-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .table-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .table-header h3 { font-size: 15px; font-weight: 800; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
  th { background: var(--surface2); padding: 10px; text-align: left; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text2); white-space: nowrap; }
  td { padding: 11px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; }
  .row-actions { display: flex; gap: 6px; }
  .row-actions button { width: 32px; height: 32px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; }
  .row-edit { background: var(--accent-dim); color: var(--accent); }
  .row-del  { background: var(--red-dim); color: var(--red); }
  .empty-state { padding: 40px 20px; text-align: center; color: var(--text2); font-size: 13px; }

  /* TOAST */
  .toast {
    position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%) translateY(-200%);
    padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 800; z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    color: #fff; max-width: 90vw; text-align: center;
  }
  .toast.ok { background: var(--green); }
  .toast.warn { background: var(--orange); color: #000; }
  .toast.err { background: var(--red); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 2000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; width: 100%; max-width: 340px; text-align: center;
  }
  .modal-box p { margin-bottom: 18px; font-size: 15px; font-weight: 600; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; }

  .timer { font-size: 11px; color: var(--text2); text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Scanner Etiquetas</h1>
  <span class="badge" id="count-badge">0 reg.</span>
</div>

<div class="main">

  <!-- SCAN SECTION -->
  <div class="scan-section">
    <div class="scan-area">

      <div class="camera-box" id="camera-box">
        <video id="video" playsinline autoplay muted></video>
        <img id="frozen" class="preview" style="display:none" alt="Frame capturado">
        <div class="guide" id="guide"><div class="guide-box"></div></div>

        <button class="cam-fab btn-import" id="btn-import" title="Importar foto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>

        <button class="cam-fab btn-torch" id="btn-torch" title="Linterna" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 2h6l-1 5h-4z"/><path d="M9 7h6v4l-3 11l-3-11z"/>
          </svg>
        </button>

        <div class="cam-overlay" id="cam-overlay">
          <div class="spin"></div>
          <div class="msg" id="cam-overlay-msg">Procesando…</div>
        </div>

        <div class="placeholder" id="cam-placeholder" style="display:none">
          Iniciando cámara…
        </div>
      </div>

      <div class="top-actions">
        <button class="btn-scan" id="btn-scan">📸 Escanear</button>
        <button class="btn-save" id="btn-save" disabled>✚ Guardar</button>
      </div>

      <div class="scan-status" id="scan-status">Apuntá a la etiqueta y tocá <strong>Escanear</strong>.</div>
      <div class="timer" id="timer"></div>
    </div>
  </div>

  <input type="file" accept="image/*" id="file-input" class="hidden-input">

  <!-- FORM -->
  <div class="form-card">
    <div class="form-row cols-1">
      <div class="field">
        <label>Código Producto</label>
        <input type="text" id="f-prod" placeholder="9XXXXXX" inputmode="numeric" autocomplete="off">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="field">
        <label>Cantidad</label>
        <input type="text" id="f-cant" placeholder="22200" inputmode="numeric" autocomplete="off">
      </div>
      <div class="field">
        <label>OF / Lote</label>
        <input type="text" id="f-lote" placeholder="3264952C" autocapitalize="characters" autocomplete="off">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-clear" id="btn-clear">Limpiar campos</button>
    </div>
  </div>

  <button class="btn btn-export" id="btn-export">📊 Exportar a Excel</button>

  <div class="table-section">
    <div class="table-header">
      <h3>Registros recientes</h3>
      <button class="btn btn-danger" style="font-size:12px;padding:7px 11px;" id="btn-clear-all">Borrar todo</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th style="width:36px;">#</th>
          <th>Producto</th>
          <th>OF / Lote</th>
          <th style="width:64px;">Cant.</th>
          <th style="width:78px;"></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-msg">No hay registros guardados.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="btn btn-clear" id="modal-cancel">Cancelar</button>
      <button class="btn btn-danger" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// PWA SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

// ============================================================
// ESTADO
// ============================================================
let inventory = [];
let editingIdx = -1;
let barcodeDetector = null;
let ocrWorker = null;
let ocrReady = false;
let isProcessing = false;

// Camera state
let stream = null;
let videoTrack = null;
let torchOn = false;

const STORAGE_KEY = 'scanner_etiquetas_v2';
const FIELDS_ID = ['f-prod', 'f-cant', 'f-lote'];

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  renderTable();
  initBarcodeDetector();
  initTesseractBackground();
  setupListeners();
  initCamera();
  updateSaveButton();
});

function setupListeners() {
  document.getElementById('btn-scan').addEventListener('click', scanFromCamera);
  document.getElementById('btn-save').addEventListener('click', saveRecord);
  document.getElementById('btn-clear').addEventListener('click', resetForm);
  document.getElementById('btn-export').addEventListener('click', exportExcel);
  document.getElementById('btn-clear-all').addEventListener('click', confirmClearAll);
  document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', handleFileImport);
  document.getElementById('btn-torch').addEventListener('click', toggleTorch);

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  window.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });

  // Update save button when fields change (manual editing)
  FIELDS_ID.forEach(id => {
    document.getElementById(id).addEventListener('input', updateSaveButton);
  });

  // Tap on frozen frame restarts camera preview
  document.getElementById('frozen').addEventListener('click', resumeCamera);

  // Pause/resume on visibility
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopCamera();
    else if (!stream) initCamera();
  });
}

function initBarcodeDetector() {
  if ('BarcodeDetector' in window) {
    try {
      barcodeDetector = new BarcodeDetector({
        formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'itf', 'codabar', 'qr_code']
      });
    } catch (e) { console.warn('BarcodeDetector no soportado:', e); }
  }
}

async function initTesseractBackground() {
  try {
    ocrWorker = await Tesseract.createWorker('spa', 1);
    ocrReady = true;
  } catch (e) { console.error('Error cargando OCR:', e); }
}

// ============================================================
// CAMERA
// ============================================================
async function initCamera() {
  const placeholder = document.getElementById('cam-placeholder');
  const video = document.getElementById('video');

  if (!navigator.mediaDevices?.getUserMedia) {
    placeholder.style.display = 'flex';
    placeholder.innerHTML = 'Cámara no disponible.<br>Usá el botón de importar foto (arriba a la izquierda).';
    return;
  }

  try {
    placeholder.style.display = 'flex';
    placeholder.textContent = 'Iniciando cámara…';

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    placeholder.style.display = 'none';

    videoTrack = stream.getVideoTracks()[0];

    // Torch support
    const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
    if (caps.torch) {
      document.getElementById('btn-torch').style.display = 'flex';
    }
    // Try continuous focus
    if (caps.focusMode && caps.focusMode.includes('continuous')) {
      videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
    }

    document.getElementById('btn-import').classList.add('show');
    document.getElementById('btn-scan').disabled = false;
  } catch (e) {
    placeholder.style.display = 'flex';
    placeholder.innerHTML = 'Sin acceso a cámara.<br><span style="font-size:11px">' + (e.message || e) + '</span><br><br>Usá el botón de importar foto.';
    document.getElementById('btn-import').classList.add('show');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; videoTrack = null; }
}

async function toggleTorch() {
  if (!videoTrack) return;
  try {
    torchOn = !torchOn;
    await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('btn-torch').classList.toggle('torch-on', torchOn);
  } catch (e) { showToast('Linterna no disponible', 'warn'); torchOn = false; }
}

function freezeFrame(dataUrl) {
  const f = document.getElementById('frozen');
  f.src = dataUrl;
  f.style.display = 'block';
  document.getElementById('video').style.display = 'none';
  document.getElementById('guide').style.display = 'none';
}

function resumeCamera() {
  document.getElementById('frozen').style.display = 'none';
  document.getElementById('frozen').src = '';
  document.getElementById('video').style.display = 'block';
  document.getElementById('guide').style.display = 'flex';
}

// ============================================================
// SCAN FROM LIVE CAMERA
// ============================================================
async function scanFromCamera() {
  if (isProcessing) return;
  const video = document.getElementById('video');
  if (!video.videoWidth) { showToast('Cámara no lista', 'warn'); return; }

  // Capture frame at full video resolution
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

  // Compress for OCR speed (also used as preview)
  const dataUrl = await compressCanvas(canvas, 1280);
  freezeFrame(dataUrl);

  await runPipeline(dataUrl);
}

// ============================================================
// IMPORT FILE
// ============================================================
async function handleFileImport(e) {
  const file = e.target.files?.[0];
  if (!file || isProcessing) return;
  e.target.value = '';

  try {
    const dataUrl = await compressFile(file, 1280);
    freezeFrame(dataUrl);
    await runPipeline(dataUrl);
  } catch (err) {
    setStatus('❌ Error cargando imagen', 'err');
  }
}

// ============================================================
// PIPELINE: BARCODE → OCR (spa) → FILL FORM
// ============================================================
async function runPipeline(dataUrl) {
  isProcessing = true;
  document.getElementById('btn-scan').disabled = true;
  showCamOverlay('Leyendo códigos…');
  resetFields();
  setStatus('⏳ Procesando…', 'work');
  vibrate(40);

  const startTime = performance.now();
  let ext = { prod: '', cant: '', lote: '' };
  let barcodeCount = 0;
  let usedOCR = false;

  // Build an Image for barcode detection
  const img = new Image();
  img.src = dataUrl;
  try {
    await new Promise((res, rej) => {
      img.onload = res; img.onerror = rej;
      setTimeout(rej, 3000);
    });
  } catch {
    setStatus('❌ Error decodificando imagen', 'err');
    finishProcessing();
    return;
  }

  // 1. BARCODE
  if (barcodeDetector) {
    try {
      const bcs = await barcodeDetector.detect(img);
      for (const bc of bcs) {
        const val = bc.rawValue.trim();
        if (!ext.prod && /^9\d{6}$/.test(val)) {
          ext.prod = val; barcodeCount++;
        } else if (!ext.lote && /^\d{7}[A-Z]*$/i.test(val) && !/^9\d{6}$/.test(val)) {
          ext.lote = val.toUpperCase(); barcodeCount++;
        } else if (!ext.cant && /^\d+$/.test(val) && !val.startsWith('9') && val.length <= 6) {
          ext.cant = val; barcodeCount++;
        }
      }
    } catch (e) { console.warn('Barcode error:', e); }
  }

  const allFound = ext.prod && ext.cant && ext.lote;

  // 2. OCR if missing
  if (!allFound) {
    if (ocrReady) {
      showCamOverlay('Reconociendo texto (OCR)…');
      try {
        const { data: { text } } = await ocrWorker.recognize(dataUrl);
        extractFromOCR(text, ext);
        usedOCR = true;
      } catch (e) { console.error('OCR error:', e); }
    } else {
      showToast('OCR aún cargando, completá manualmente', 'warn');
    }
  }

  // 3. FILL
  fillFields(ext, usedOCR);
  const totalTime = Math.round(performance.now() - startTime);
  showTimer(totalTime);

  const found = (ext.prod ? 1 : 0) + (ext.cant ? 1 : 0) + (ext.lote ? 1 : 0);

  if (found === 3) {
    if (!usedOCR) {
      setStatusHTML(`<span class="method-badge barcode">BARCODE</span> ✓ 3/3 códigos · ${totalTime}ms`, 'ok');
    } else if (barcodeCount > 0) {
      setStatusHTML(`<span class="method-badge mixed">MIXTO</span> ✓ ${barcodeCount} barcode + ${3-barcodeCount} OCR · ${totalTime}ms`, 'ok');
    } else {
      setStatusHTML(`<span class="method-badge ocr">OCR</span> ✓ 3/3 por texto · ${totalTime}ms`, 'warn');
    }
    vibrate([60, 40, 60]);
  } else if (found > 0) {
    setStatusHTML(`<span class="method-badge ${usedOCR ? 'ocr' : 'barcode'}">${usedOCR ? 'OCR' : 'BARCODE'}</span> ⚠ ${found}/3 detectados, completá los faltantes · ${totalTime}ms`, 'warn');
    vibrate([200]);
  } else {
    setStatus('❌ No se detectó nada. Reescaneá o cargá manual.', 'err');
    vibrate([300]);
  }

  hideCamOverlay();
  finishProcessing();
  updateSaveButton();
}

function finishProcessing() {
  isProcessing = false;
  document.getElementById('btn-scan').disabled = false;
}

// ============================================================
// OCR EXTRACTION
// ============================================================
function extractFromOCR(ocrText, ext) {
  const text = ocrText.toUpperCase();

  if (!ext.prod) {
    const m = text.match(/\b(9\d{6})\b/);
    if (m) ext.prod = m[1];
  }

  if (!ext.cant) {
    // After CANTIDAD keyword
    const cantMatch = text.match(/CANTIDAD[:\s\n\r]*(\d{2,6})\b/);
    if (cantMatch) {
      ext.cant = cantMatch[1];
    } else {
      // Fallback: any large integer that isn't product or lote
      const nums = text.match(/\b(\d{3,6})\b/g);
      if (nums) {
        for (const n of nums) {
          if (n !== ext.prod && !n.startsWith('9') && parseInt(n) >= 100) {
            ext.cant = n; break;
          }
        }
      }
    }
  }

  if (!ext.lote) {
    // After OF/LOTE keyword
    const loteMatch = text.match(/(?:OF[\s\/\\]*)?LOTE[:\s\n\r]*([A-Z0-9]{6,10})\b/);
    if (loteMatch) {
      ext.lote = loteMatch[1];
    } else {
      // Fallback: 7 digits + letter
      const lp = text.match(/\b(\d{7}[A-Z]+)\b/);
      if (lp) ext.lote = lp[1];
    }
  }
}

// ============================================================
// FORM
// ============================================================
function fillFields(ext, usedOCR) {
  const cls = usedOCR ? 'filled-ocr' : 'filled';
  if (ext.prod) fillField('f-prod', ext.prod, 'filled');
  if (ext.cant) fillField('f-cant', ext.cant, ext.prod && !usedOCR ? 'filled' : cls);
  if (ext.lote) fillField('f-lote', ext.lote, ext.prod && !usedOCR ? 'filled' : cls);
}

function fillField(id, val, cssClass = 'filled') {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = val;
  el.classList.remove('filled', 'filled-ocr');
  el.classList.add(cssClass, 'flash');
  setTimeout(() => el.classList.remove('flash'), 500);
}

function resetFields() {
  FIELDS_ID.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('filled', 'filled-ocr', 'flash'); }
  });
  document.getElementById('timer').textContent = '';
}

function resetForm() {
  resetFields();
  resumeCamera();
  editingIdx = -1;
  const btn = document.getElementById('btn-save');
  btn.textContent = '✚ Guardar';
  btn.classList.remove('editing');
  setStatus('Apuntá a la etiqueta y tocá Escanear.', '');
  updateSaveButton();
}

function updateSaveButton() {
  const p = document.getElementById('f-prod').value.trim();
  const c = document.getElementById('f-cant').value.trim();
  const l = document.getElementById('f-lote').value.trim();
  document.getElementById('btn-save').disabled = !(p && c && l);
}

function saveRecord() {
  const p = document.getElementById('f-prod').value.trim();
  const c = document.getElementById('f-cant').value.trim();
  const l = document.getElementById('f-lote').value.trim();
  if (!p || !c || !l) { showToast('⚠ Llené todos los campos', 'warn'); return; }

  const record = { id: Date.now(), ts: new Date().toISOString(), prod: p, cant: c, lote: l };

  if (editingIdx >= 0) {
    record.ts = inventory[editingIdx].ts;
    inventory[editingIdx] = record;
    showToast('✓ Actualizado', 'ok');
  } else {
    inventory.push(record);
    showToast('✓ Guardado', 'ok');
    vibrate(100);
  }

  editingIdx = -1;
  saveData();
  renderTable();
  resetForm();
  setStatus('✓ Listo para el siguiente.', 'ok');
}

function editRecord(idx) {
  const item = inventory[idx];
  if (!item) return;
  document.getElementById('f-prod').value = item.prod || '';
  document.getElementById('f-cant').value = item.cant || '';
  document.getElementById('f-lote').value = item.lote || '';
  FIELDS_ID.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.value) el.classList.add('filled');
  });
  resumeCamera();
  editingIdx = idx;
  const btn = document.getElementById('btn-save');
  btn.textContent = '✎ Actualizar #' + (idx + 1);
  btn.classList.add('editing');
  updateSaveButton();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteRecord(idx) {
  showModal('¿Eliminar este registro?', () => {
    inventory.splice(idx, 1);
    saveData(); renderTable();
    showToast('✓ Eliminado', 'ok');
    closeModal();
  });
}

function confirmClearAll() {
  if (!inventory.length) return;
  showModal('¿Borrar TODO el inventario?', () => {
    inventory = [];
    saveData(); renderTable(); resetForm();
    showToast('💣 Inventario vaciado', 'ok');
    closeModal();
  });
}

// ============================================================
// TABLE
// ============================================================
function escapeHtml(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const emptyMsg = document.getElementById('empty-msg');
  document.getElementById('count-badge').textContent = inventory.length + ' reg.';

  if (!inventory.length) { tbody.innerHTML = ''; emptyMsg.style.display = 'block'; return; }
  emptyMsg.style.display = 'none';

  tbody.innerHTML = inventory.slice().reverse().slice(0, 50).map((item, i) => {
    const realIdx = inventory.length - 1 - i;
    return `<tr>
      <td style="color:var(--text2)">${realIdx + 1}</td>
      <td><strong>${escapeHtml(item.prod)}</strong></td>
      <td>${escapeHtml(item.lote)}</td>
      <td><strong>${escapeHtml(item.cant)}</strong></td>
      <td><div class="row-actions">
        <button class="row-edit" data-edit="${realIdx}">✎</button>
        <button class="row-del" data-del="${realIdx}">✕</button>
      </div></td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.row-edit').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); editRecord(+btn.dataset.edit); };
  });
  tbody.querySelectorAll('.row-del').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); deleteRecord(+btn.dataset.del); };
  });
}

// ============================================================
// EXPORT EXCEL
// ============================================================
function exportExcel() {
  if (!inventory.length) { showToast('⚠ No hay registros', 'warn'); return; }
  try {
    const ws = XLSX.utils.json_to_sheet(inventory.map((item, i) => ({
      '#': i + 1,
      'Fecha': item.ts ? new Date(item.ts).toLocaleString('es-AR') : '',
      'Producto': item.prod,
      'Cantidad': item.cant,
      'OF / Lote': item.lote
    })));
    ws['!cols'] = [{wch:5},{wch:20},{wch:12},{wch:10},{wch:14}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Etiquetas');
    XLSX.writeFile(wb, 'Etiquetas_' + new Date().toISOString().slice(0, 10) + '.xlsx');
    showToast('✓ Excel descargado', 'ok');
  } catch (e) { showToast('❌ Error al exportar', 'err'); console.error(e); }
}

// ============================================================
// STORAGE
// ============================================================
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); }
  catch (e) { showToast('❌ Espacio lleno', 'err'); }
}
function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) inventory = JSON.parse(r);
  } catch (e) { inventory = []; }
}

// ============================================================
// IMAGE COMPRESSION
// ============================================================
function compressFile(file, maxWidth = 1280) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function compressCanvas(srcCanvas, maxWidth = 1280) {
  return new Promise(resolve => {
    let w = srcCanvas.width, h = srcCanvas.height;
    if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(srcCanvas, 0, 0, w, h);
    resolve(c.toDataURL('image/jpeg', 0.85));
  });
}

// ============================================================
// UI HELPERS
// ============================================================
function setStatus(msg, type) {
  const el = document.getElementById('scan-status');
  el.textContent = msg;
  el.className = 'scan-status ' + (type || '');
}
function setStatusHTML(html, type) {
  const el = document.getElementById('scan-status');
  el.innerHTML = html;
  el.className = 'scan-status ' + (type || '');
}
function showTimer(ms) { document.getElementById('timer').textContent = `⏱ ${ms}ms`; }

let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function showModal(msg, fn) {
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-confirm').onclick = fn;
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

function showCamOverlay(msg) {
  document.getElementById('cam-overlay-msg').textContent = msg || 'Procesando…';
  document.getElementById('cam-overlay').classList.add('show');
}
function hideCamOverlay() { document.getElementById('cam-overlay').classList.remove('show'); }

window.addEventListener('beforeunload', () => {
  if (ocrWorker) ocrWorker.terminate().catch(() => {});
  stopCamera();
});
</script>
