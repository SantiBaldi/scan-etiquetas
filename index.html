<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCAN Etiquetas</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #ffffff; --green: #00ff88; --yellow: #ffb800; --cyan: #00d9ff; --red: #ff3344; --gray: #555555; }
        body { margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        header { display: flex; justify-content: space-between; padding: 15px; background: var(--panel); border-bottom: 1px solid var(--gray); align-items: center; }
        .cam-container { position: relative; flex: 1; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center;}
        video { width: 100%; height: 100%; object-fit: cover; }
        .guide { position: absolute; width: 80%; height: 50%; border: 2px dashed var(--green); box-sizing: border-box; }
        .btn-photo { position: absolute; top: 10px; right: 10px; background: var(--cyan); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
        .slots-panel { background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .slot { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 10px; border: 1px solid var(--gray); border-radius: 8px; }
        .slot.valid-cam { border-color: var(--green); box-shadow: 0 0 8px rgba(0,255,136,0.2); }
        .slot.valid-ocr { border-color: var(--yellow); box-shadow: 0 0 8px rgba(255,184,0,0.2); }
        .slot-info { display: flex; flex-direction: column; }
        .slot-label { font-size: 12px; color: #aaa; }
        .slot-val { font-size: 18px; font-weight: bold; min-height: 24px; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; color: #000;}
        .badge.cam { background: var(--green); } .badge.ocr { background: var(--yellow); } .badge.manual { background: var(--gray); color: #fff;}
        .btn-edit { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); padding: 5px 15px; border-radius: 5px; }
        .actions { display: flex; gap: 10px; padding: 15px; }
        .btn-main { flex: 1; height: 64px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; text-transform: uppercase; }
        #btn-scan { background: var(--cyan); color: #000; }
        #btn-register { background: var(--green); color: #000; opacity: 0.5; pointer-events: none; }
        #btn-register.active { opacity: 1; pointer-events: auto; }
        .footer { display: flex; justify-content: space-between; padding: 15px; background: var(--panel); }
        .btn-sec { background: var(--gray); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; margin: 0 5px; }
        .btn-sec.red { background: var(--red); }
        .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; padding: 20px; z-index: 100; overflow-y: auto;}
        .overlay.active { display: flex; }
        .loader { display: none; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); color: white; justify-content: center; align-items: center; z-index: 50; flex-direction: column;}
        .history-item { background: var(--panel); padding: 10px; margin-bottom: 10px; border-radius: 8px; position: relative; }
        .btn-del-item { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; border: none; border-radius: 4px; padding: 5px 10px;}
    </style>
</head>
<body>

    <header>
        <strong id="mode-indicator">SCAN Etiquetas</strong>
    </header>

    <div class="cam-container">
        <video id="video" autoplay playsinline></video>
        <div class="guide"></div>
        <button class="btn-photo" onclick="document.getElementById('file-input').click()">📸 MODO FOTO</button>
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div id="loader" class="loader"><div style="font-size: 24px; margin-bottom: 10px;">⏳</div><span id="loader-msg">Procesando...</span></div>
    </div>

    <div class="slots-panel mono">
        <div class="slot" id="slot-01">
            <div class="slot-info">
                <span class="slot-label">01 Producto (9XXXXXX) <span id="badge-01"></span></span>
                <span class="slot-val" id="val-01">---</span>
            </div>
            <button class="btn-edit" onclick="editSlot('01')">EDIT</button>
        </div>
        <div class="slot" id="slot-02">
            <div class="slot-info">
                <span class="slot-label">02 Cantidad <span id="badge-02"></span></span>
                <span class="slot-val" id="val-02">---</span>
            </div>
            <button class="btn-edit" onclick="editSlot('02')">EDIT</button>
        </div>
        <div class="slot" id="slot-03">
            <div class="slot-info">
                <span class="slot-label">03 OF/Lote <span id="badge-03"></span></span>
                <span class="slot-val" id="val-03">---</span>
            </div>
            <button class="btn-edit" onclick="editSlot('03')">EDIT</button>
        </div>
    </div>

    <div class="actions">
        <button class="btn-main" id="btn-scan" onclick="startCapturePipeline()">ESCANEAR</button>
        <button class="btn-main" id="btn-register" onclick="registerPallet()">REGISTRAR</button>
    </div>

    <div class="footer">
        <button class="btn-sec" onclick="exportCSV()">EXPORTAR</button>
        <button class="btn-sec" onclick="showHistory()">HISTORIAL</button>
        <button class="btn-sec red" onclick="clearAll()">BORRAR</button>
    </div>

    <!-- Overlay de Historial -->
    <div id="history-overlay" class="overlay">
        <h2 style="margin-top:0">Historial</h2>
        <div id="history-list"></div>
        <button class="btn-main" style="margin-top: 20px; background: var(--gray);" onclick="document.getElementById('history-overlay').classList.remove('active')">CERRAR</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

<script>
// --- CONFIGURACIÓN Y VALIDACIONES ---
const VALIDATORS = {
    '01': { regex: /^9\d{6}$/ },
    '02': { regex: /^\d+$/ },
    '03': { regex: /^\d{7}[A-Z]*$/ }
};

let currentData = { '01': null, '02': null, '03': null };
let currentSource = 'cam'; // cam o foto

// --- INICIO DE CÁMARA ---
const video = document.getElementById('video');
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    } catch (err) { alert("Error accediendo a la cámara. Revisa los permisos."); }
}
startCamera();

// --- PIPELINE DE CAPTURA (BARCODE + OCR) ---
async function startCapturePipeline(imageSource = null) {
    if(navigator.vibrate) navigator.vibrate(50);
    showLoader("Leyendo barcodes...");
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgToProcess = imageSource;

    if (!imgToProcess) {
        // Capturar frame de video
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        imgToProcess = canvas;
        currentSource = 'cam';
    } else {
        currentSource = 'foto';
    }

    // Paso 1: Intentar leer Barcodes nativo (Si está disponible)
    let barcodesLeidos = false;
    if ('BarcodeDetector' in window) {
        try {
            const detector = new BarcodeDetector({ formats: ['code_128', 'qr_code', 'ean_13', 'data_matrix'] });
            const barcodes = await detector.detect(imgToProcess);
            barcodes.forEach(bc => processValue(bc.rawValue, currentSource));
            barcodesLeidos = true;
        } catch (e) { console.log("BarcodeDetector falló", e); }
    }

    // Si falta algún slot, lanzar OCR
    if (!currentData['01'] || !currentData['02'] || !currentData['03']) {
        showLoader("Reconociendo texto (OCR)...");
        try {
            // Tesseract usa la imagen del canvas o la foto cargada
            let imgData = imgToProcess instanceof HTMLCanvasElement ? imgToProcess.toDataURL('image/jpeg') : imgToProcess;
            const result = await Tesseract.recognize(imgData, 'eng');
            parseOCRText(result.data.text);
        } catch(e) {
            alert("Error en OCR. Carga manual recomendada.");
        }
    }

    hideLoader();
    updateUI();
}

// Procesa un valor y lo asigna si cumple la regex
function processValue(val, origin) {
    val = val.trim();
    if (!currentData['01'] && VALIDATORS['01'].regex.test(val)) { currentData['01'] = { val, origin }; return; }
    if (!currentData['03'] && VALIDATORS['03'].regex.test(val)) { currentData['03'] = { val, origin }; return; }
    // Slot 2 al final porque su regex (solo numeros) es muy genérica
    if (!currentData['02'] && VALIDATORS['02'].regex.test(val)) { currentData['02'] = { val, origin }; return; }
}

// Lógica de búsqueda en texto OCR
function parseOCRText(text) {
    const lines = text.toUpperCase().split('\n');
    const allWords = text.toUpperCase().match(/\S+/g) || [];

    // Slot 1: Buscar 9XXXXXX
    if (!currentData['01']) {
        const match = text.match(/9\d{6}\b/);
        if (match) processValue(match[0], 'ocr');
    }

    // Slot 3: OF/LOTE (Buscar keyword y luego patron, o fallback)
    if (!currentData['03']) {
        const matchFallback = text.match(/\b\d{7}[A-Z]+\b/); // 7 digitos + letras
        if (matchFallback && !VALIDATORS['01'].regex.test(matchFallback[0])) {
            processValue(matchFallback[0], 'ocr');
        } else {
            // Intentar buscar solo 7 digitos que no empiecen con 9
            const match7 = text.match(/\b[0-8]\d{6}\b/);
            if(match7) processValue(match7[0], 'ocr');
        }
    }

    // Slot 2: CANTIDAD
    if (!currentData['02']) {
        let cantInd = allWords.findIndex(w => w.includes('CANTIDAD'));
        if (cantInd >= 0 && allWords[cantInd+1]) {
            let num = allWords[cantInd+1].replace(/\D/g, '');
            if(num) processValue(num, 'ocr');
        } else {
            // Fallback: numero grande que no sea el slot 1 ni 3
            let nums = text.match(/\b\d{3,}\b/g) || [];
            for(let n of nums) {
                if((!currentData['01'] || n !== currentData['01'].val) && 
                   (!currentData['03'] || n !== currentData['03'].val)) {
                    processValue(n, 'ocr'); break;
                }
            }
        }
    }
}

// --- FOTO IMPORT ---
document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            startCapturePipeline(canvas);
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

// --- UI Y ESTADOS ---
function updateUI() {
    let allValid = true;
    ['01', '02', '03'].forEach(id => {
        const div = document.getElementById(`slot-${id}`);
        const valSpan = document.getElementById(`val-${id}`);
        const badge = document.getElementById(`badge-${id}`);
        
        div.className = 'slot'; badge.innerHTML = ''; badge.className = 'badge';
        
        if (currentData[id]) {
            valSpan.innerText = currentData[id].val;
            badge.innerText = currentData[id].origin.toUpperCase();
            badge.classList.add(currentData[id].origin);
            if (currentData[id].origin === 'cam' || currentData[id].origin === 'foto') div.classList.add('valid-cam');
            else if (currentData[id].origin === 'ocr') div.classList.add('valid-ocr');
        } else {
            valSpan.innerText = '---';
            allValid = false;
        }
    });

    const btnReg = document.getElementById('btn-register');
    if (allValid) btnReg.classList.add('active');
    else btnReg.classList.remove('active');
}

function editSlot(id) {
    const newVal = prompt(`Editar Slot ${id}:`, currentData[id] ? currentData[id].val : '');
    if (newVal !== null && newVal.trim() !== '') {
        if (VALIDATORS[id].regex.test(newVal.trim())) {
            currentData[id] = { val: newVal.trim(), origin: 'manual' };
            updateUI();
        } else {
            alert('Formato inválido para este campo.');
        }
    }
}

// --- PERSISTENCIA Y REGISTRO ---
function registerPallet() {
    if (!currentData['01'] || !currentData['02'] || !currentData['03']) return;
    
    const now = new Date();
    const record = {
        id: Date.now(),
        iso: now.toISOString(),
        fecha: now.toLocaleDateString('es-ES'),
        hora: now.toLocaleTimeString('es-ES'),
        p01: currentData['01'].val,
        p02: currentData['02'].val,
        p03: currentData['03'].val,
        o01: currentData['01'].origin,
        o02: currentData['02'].origin,
        o03: currentData['03'].origin,
    };

    let history = JSON.parse(localStorage.getItem('scan_etiquetas_v1') || '[]');
    history.push(record);
    localStorage.setItem('scan_etiquetas_v1', JSON.stringify(history));

    if(navigator.vibrate) navigator.vibrate([200, 100, 200]); // Patrón largo
    
    // Limpiar para el siguiente
    currentData = { '01': null, '02': null, '03': null };
    currentSource = 'cam';
    updateUI();
    
    // Mostrar Toast (simulado)
    showLoader("¡Guardado OK!");
    setTimeout(hideLoader, 1000);
}

// --- HISTORIAL ---
function showHistory() {
    const history = JSON.parse(localStorage.getItem('scan_etiquetas_v1') || '[]');
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    
    history.slice().reverse().forEach(item => {
        list.innerHTML += `
            <div class="history-item mono">
                <button class="btn-del-item" onclick="deleteItem(${item.id})">✕</button>
                <div style="font-size:12px; color:#aaa; margin-bottom:5px;">${item.fecha} ${item.hora}</div>
                <div>01: <b>${item.p01}</b> <span class="badge ${item.o01}">${item.o01.toUpperCase()}</span></div>
                <div>02: <b>${item.p02}</b> <span class="badge ${item.o02}">${item.o02.toUpperCase()}</span></div>
                <div>03: <b>${item.p03}</b> <span class="badge ${item.o03}">${item.o03.toUpperCase()}</span></div>
            </div>
        `;
    });
    document.getElementById('history-overlay').classList.add('active');
}

function deleteItem(id) {
    if(!confirm("¿Borrar este registro?")) return;
    let history = JSON.parse(localStorage.getItem('scan_etiquetas_v1') || '[]');
    history = history.filter(i => i.id !== id);
    localStorage.setItem('scan_etiquetas_v1', JSON.stringify(history));
    showHistory();
}

function clearAll() {
    const history = JSON.parse(localStorage.getItem('scan_etiquetas_v1') || '[]');
    if(history.length === 0) { alert("No hay registros."); return; }
    if(confirm(`⚠️ ATENCIÓN ⚠️\nVas a borrar ${history.length} registros.\n¿Exportaste el CSV antes de borrar?`)) {
        localStorage.removeItem('scan_etiquetas_v1');
        alert("Borrados.");
    }
}

// --- EXPORTAR CSV ---
function exportCSV() {
    const history = JSON.parse(localStorage.getItem('scan_etiquetas_v1') || '[]');
    if(history.length === 0) { alert("No hay datos para exportar."); return; }

    let csvContent = "\uFEFF"; // BOM UTF-8 para Excel
    csvContent += "timestamp_iso;fecha;hora;producto_01;cantidad_02;of_lote_03;origen_01;origen_02;origen_03\n";
    
    history.forEach(r => {
        csvContent += `${r.iso};${r.fecha};${r.hora};${r.p01};${r.p02};${r.p03};${r.o01};${r.o02};${r.o03}\n`;
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const now = new Date();
    const dateStr = now.toISOString().slice(0,19).replace(/T/g,"-").replace(/:/g,"-");
    
    link.setAttribute("href", url);
    link.setAttribute("download", `scan_etiquetas_${dateStr}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// Utils
function showLoader(msg) { 
    document.getElementById('loader-msg').innerText = msg; 
    document.getElementById('loader').style.display = 'flex'; 
}
function hideLoader() { document.getElementById('loader').style.display = 'none'; }

// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
