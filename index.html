<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCAN">
<title>SCAN · Etiquetas Pallet</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --bg-2: #141414; --bg-3: #1c1c1c; --line: #2a2a2a;
    --text: #e8e8e8; --text-dim: #888; --text-faint: #555;
    --ok: #00ff88; --ok-dim: #00cc6f; --warn: #ffb800; --err: #ff3344; --accent: #00d9ff;
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
    height: 100%; overflow: hidden; overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 24px 24px;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--bg-2); flex-shrink: 0;
  }
  .logo {
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 700; font-size: 13px;
    letter-spacing: 0.15em; color: var(--ok); display: flex; align-items: center; gap: 8px;
  }
  .logo::before {
    content: ''; width: 8px; height: 8px; background: var(--ok); border-radius: 50%;
    box-shadow: 0 0 8px var(--ok); animation: pulse 2s infinite;
  }
  .logo.photo::before { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: none; }
  .logo.photo { color: var(--accent); }
  .logo.ocr::before { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1s infinite; }
  .logo.ocr { color: var(--warn); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .counter { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 12px; color: var(--text-dim); }
  .counter strong { color: var(--text); font-size: 16px; margin-right: 4px; }

  .camera-wrap { position: relative; flex: 1; background: #000; overflow: hidden; min-height: 0; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #photo-preview { width: 100%; height: 100%; object-fit: contain; display: none; background: #000; }

  .frame-guide {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 75%; height: 75%; border: 2px solid rgba(255,255,255,0.25); border-radius: 4px; pointer-events: none;
  }
  .frame-guide.hidden { display: none; }
  .frame-guide::before, .frame-guide::after, .frame-guide > span::before, .frame-guide > span::after {
    content: ''; position: absolute; width: 24px; height: 24px;
    border-color: var(--accent); border-style: solid; border-width: 0;
  }
  .frame-guide::before { top: -2px; left: -2px; border-top-width: 3px; border-left-width: 3px; }
  .frame-guide::after { top: -2px; right: -2px; border-top-width: 3px; border-right-width: 3px; }
  .frame-guide > span::before { bottom: -2px; left: -2px; border-bottom-width: 3px; border-left-width: 3px; }
  .frame-guide > span::after { bottom: -2px; right: -2px; border-bottom-width: 3px; border-right-width: 3px; }

  .fab {
    position: absolute; width: 48px; height: 48px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; color: var(--text); z-index: 10;
  }
  .fab svg { width: 22px; height: 22px; }
  .fab:active { background: rgba(0,217,255,0.3); }
  .btn-import-fab { top: 12px; right: 12px; }

  .btn-ocr {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%) translateY(200%);
    padding: 12px 22px; background: var(--warn); color: #000; border: none; border-radius: 8px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    z-index: 10; transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(255,184,0,0.4); display: flex; align-items: center; gap: 8px;
  }
  .btn-ocr.show { transform: translateX(-50%) translateY(0); }
  .btn-ocr:active { background: #e0a200; }

  .btn-exit-photo {
    position: absolute; top: 12px; left: 12px;
    padding: 8px 14px; background: var(--accent); color: #000; border: none; border-radius: 6px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    z-index: 10; display: none;
  }
  .btn-exit-photo.show { display: flex; align-items: center; gap: 6px; }

  .no-cam {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; text-align: center; color: var(--text-dim);
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 13px; line-height: 1.6;
  }
  .no-cam button {
    margin-top: 12px; padding: 14px 28px; background: var(--ok); color: #000; border: none;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 700; font-size: 13px;
    letter-spacing: 0.1em; border-radius: 4px;
  }

  .ocr-progress {
    position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
    z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px;
  }
  .ocr-progress.show { display: flex; }
  .ocr-progress .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(255,184,0,0.2); border-top-color: var(--warn);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ocr-progress .msg {
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 13px;
    letter-spacing: 0.1em; color: var(--warn); text-align: center;
  }
  .ocr-progress .sub {
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 10px;
    color: var(--text-faint); text-align: center; max-width: 280px; line-height: 1.5;
  }

  .panel { background: var(--bg-2); border-top: 1px solid var(--line); flex-shrink: 0; }
  .slot {
    display: grid; grid-template-columns: 38px 1fr auto;
    align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--line); transition: background 120ms;
  }
  .slot:last-child { border-bottom: none; }
  .slot.ok { background: rgba(0,255,136,0.05); }
  .slot.warn { background: rgba(255,184,0,0.05); }
  .slot.ocr { background: rgba(255,184,0,0.05); }
  .slot-tag {
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 700; font-size: 11px;
    color: var(--text-faint); letter-spacing: 0.1em;
  }
  .slot.ok .slot-tag { color: var(--ok); }
  .slot.warn .slot-tag, .slot.ocr .slot-tag { color: var(--warn); }
  .slot-content { display: flex; flex-direction: column; min-width: 0; }
  .slot-label {
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-faint);
    display: flex; align-items: center; gap: 6px;
  }
  .slot-badge {
    font-size: 8px; padding: 1px 5px; border-radius: 3px;
    background: var(--bg-3); color: var(--text-faint); letter-spacing: 0.15em;
  }
  .slot.ok .slot-badge { background: rgba(0,255,136,0.15); color: var(--ok); }
  .slot.ocr .slot-badge { background: rgba(255,184,0,0.2); color: var(--warn); }
  .slot-value {
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 18px; font-weight: 600;
    color: var(--text-dim); line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .slot.ok .slot-value { color: var(--text); }
  .slot.warn .slot-value, .slot.ocr .slot-value { color: var(--text); }
  .slot-edit {
    background: transparent; border: 1px solid var(--line); color: var(--text-faint);
    padding: 6px 10px; border-radius: 4px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 10px;
    letter-spacing: 0.1em; margin-left: 8px;
  }
  .slot-edit:active { background: var(--bg-3); }

  .actions { display: grid; padding: 12px; background: var(--bg); border-top: 1px solid var(--line); }
  .btn-register {
    height: 64px; background: var(--bg-3); color: var(--text-faint); border: 1px solid var(--line);
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 700; font-size: 17px;
    letter-spacing: 0.2em; border-radius: 6px; transition: all 150ms;
  }
  .btn-register.ready {
    background: var(--ok); color: #000; border-color: var(--ok);
    box-shadow: 0 0 24px rgba(0,255,136,0.4);
  }
  .btn-register.ready:active { transform: scale(0.98); background: var(--ok-dim); }
  .btn-register .hint {
    display: block; font-size: 10px; font-weight: 400;
    letter-spacing: 0.15em; margin-top: 2px; opacity: 0.7;
  }

  .toolbar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 12px 12px; background: var(--bg); }
  .btn-sec {
    height: 42px; background: transparent; color: var(--text-dim); border: 1px solid var(--line);
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  .btn-sec:active { background: var(--bg-3); }
  .btn-sec.danger:active { color: var(--err); border-color: var(--err); }

  .history-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 100;
    display: flex; flex-direction: column; transform: translateY(100%);
    transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1);
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  .history-overlay.open { transform: translateY(0); }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--line); background: var(--bg-2);
  }
  .history-title { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 700; font-size: 14px; letter-spacing: 0.1em; }
  .history-close { background: transparent; border: none; color: var(--text); font-size: 24px; padding: 4px 12px; }
  .history-list { flex: 1; overflow-y: auto; padding: 8px; }
  .history-item {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px;
    padding: 12px 14px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto; gap: 8px;
  }
  .history-item-data { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 13px; line-height: 1.5; }
  .history-item-data div span.tag { color: var(--text-faint); margin-right: 6px; font-size: 10px; letter-spacing: 0.1em; }
  .history-item-data div span.src {
    margin-left: 6px; font-size: 9px; padding: 1px 5px; border-radius: 3px;
    letter-spacing: 0.1em; background: var(--bg-3); color: var(--text-faint);
  }
  .history-item-data div span.src.cam { background: rgba(0,255,136,0.15); color: var(--ok); }
  .history-item-data div span.src.foto { background: rgba(0,217,255,0.15); color: var(--accent); }
  .history-item-data div span.src.ocr { background: rgba(255,184,0,0.2); color: var(--warn); }
  .history-item-data div span.src.manual { background: rgba(255,51,68,0.15); color: var(--err); }
  .history-item-time { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 10px; color: var(--text-faint); margin-top: 6px; }
  .history-item-del { background: transparent; border: none; color: var(--text-faint); font-size: 18px; padding: 0 8px; align-self: start; }
  .history-empty { text-align: center; color: var(--text-faint); font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 12px; padding: 60px 20px; }

  .toast {
    position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%) translateY(-200%);
    background: var(--ok); color: #000; padding: 12px 24px; border-radius: 4px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 700; font-size: 13px;
    letter-spacing: 0.1em; z-index: 200;
    transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 90vw; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--err); color: #fff; }
  .toast.info { background: var(--accent); color: #000; }
  .toast.warn { background: var(--warn); color: #000; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 24px; max-width: 360px; width: 100%;
  }
  .modal h3 { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 14px; letter-spacing: 0.1em; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
  .modal input {
    width: 100%; padding: 14px; background: var(--bg-3); border: 1px solid var(--line); border-radius: 4px;
    color: var(--text); font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 18px; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .hint { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 10px; color: var(--text-faint); margin-bottom: 16px; letter-spacing: 0.05em; }
  .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-actions button {
    height: 44px; border: 1px solid var(--line); background: transparent; color: var(--text);
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 12px; letter-spacing: 0.1em; border-radius: 4px;
  }
  .modal-actions .confirm { background: var(--ok); border-color: var(--ok); color: #000; }
  .modal-actions .danger { background: var(--err); border-color: var(--err); color: #fff; }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">SCAN · ETIQUETAS</div>
  <div class="counter"><strong id="count">0</strong>REGISTROS</div>
</header>

<div class="camera-wrap">
  <video id="video" playsinline autoplay muted></video>
  <img id="photo-preview" alt="Foto importada">
  <div class="frame-guide" id="frame-guide"><span></span></div>

  <button class="fab btn-import-fab" id="btn-import" title="Importar foto">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
  </button>

  <button class="btn-exit-photo" id="btn-exit-photo">✕ VOLVER A CÁMARA</button>

  <button class="btn-ocr" id="btn-ocr">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
      <path d="M7 12h10"/>
    </svg>
    LEER POR TEXTO (OCR)
  </button>

  <div class="ocr-progress" id="ocr-progress">
    <div class="spinner"></div>
    <div class="msg" id="ocr-msg">PROCESANDO…</div>
    <div class="sub" id="ocr-sub">Detectando texto en la imagen</div>
  </div>

  <div class="no-cam" id="nocam" style="display:none">
    <div id="nocam-msg">Cámara no iniciada</div>
    <button id="btn-start">INICIAR CÁMARA</button>
  </div>
</div>

<div class="panel">
  <div class="slot" id="slot-1" data-idx="1">
    <div class="slot-tag">01</div>
    <div class="slot-content">
      <div class="slot-label">Producto <span class="slot-badge" id="badge-1"></span></div>
      <div class="slot-value" id="val-1">—</div>
    </div>
    <button class="slot-edit" data-idx="1">EDIT</button>
  </div>
  <div class="slot" id="slot-2" data-idx="2">
    <div class="slot-tag">02</div>
    <div class="slot-content">
      <div class="slot-label">Cantidad <span class="slot-badge" id="badge-2"></span></div>
      <div class="slot-value" id="val-2">—</div>
    </div>
    <button class="slot-edit" data-idx="2">EDIT</button>
  </div>
  <div class="slot" id="slot-3" data-idx="3">
    <div class="slot-tag">03</div>
    <div class="slot-content">
      <div class="slot-label">OF/Lote <span class="slot-badge" id="badge-3"></span></div>
      <div class="slot-value" id="val-3">—</div>
    </div>
    <button class="slot-edit" data-idx="3">EDIT</button>
  </div>
</div>

<div class="actions">
  <button class="btn-register" id="btn-register" disabled>
    REGISTRAR
    <span class="hint" id="register-hint">Esperando 3 códigos…</span>
  </button>
</div>

<div class="toolbar">
  <button class="btn-sec" id="btn-history">HISTORIAL</button>
  <button class="btn-sec" id="btn-export">EXPORTAR</button>
  <button class="btn-sec danger" id="btn-clear">BORRAR</button>
</div>

<input type="file" id="file-input" accept="image/*">

<div class="history-overlay" id="history-overlay">
  <div class="history-header">
    <div class="history-title">HISTORIAL</div>
    <button class="history-close" id="history-close">✕</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-edit">
  <div class="modal">
    <h3 id="edit-title">EDITAR</h3>
    <p id="edit-desc"></p>
    <input type="text" id="edit-input" autocomplete="off" autocapitalize="characters">
    <div class="hint" id="edit-hint"></div>
    <div class="modal-actions">
      <button id="edit-cancel">CANCELAR</button>
      <button class="confirm" id="edit-save">GUARDAR</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-clear">
  <div class="modal">
    <h3>BORRAR TODO</h3>
    <p>Se eliminarán <span id="modal-count">0</span> registros. ¿Exportaste antes?</p>
    <div class="modal-actions">
      <button id="modal-cancel">CANCELAR</button>
      <button class="danger" id="modal-confirm">BORRAR</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ===== PWA =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

// ===== VALIDATORS (by slot) =====
const VALIDATORS = {
  1: { regex: /^9\d{6}$/,        label: 'Producto', hint: '7 dígitos, empieza con 9',       sample: '9012090'  },
  2: { regex: /^\d+$/,           label: 'Cantidad', hint: 'Solo números enteros',           sample: '22200'    },
  3: { regex: /^\d{7}[A-Z]*$/i,  label: 'OF/Lote',  hint: '7 dígitos + letras opcionales',  sample: '3264952C' }
};
const validate = (idx, v) => !!v && VALIDATORS[idx].regex.test(String(v).trim());

function classifyByFormat(rawValues) {
  const out = { 1: null, 2: null, 3: null };
  const pool = [...rawValues];
  // Priority: slot 1 (most specific) → slot 3 → slot 2
  for (let i = 0; i < pool.length; i++) {
    if (pool[i] && validate(1, pool[i])) { out[1] = pool[i]; pool[i] = null; break; }
  }
  for (let i = 0; i < pool.length; i++) {
    if (!pool[i]) continue;
    if (validate(3, pool[i]) && !validate(1, pool[i])) { out[3] = pool[i]; pool[i] = null; break; }
  }
  for (let i = 0; i < pool.length; i++) {
    if (!pool[i]) continue;
    if (validate(2, pool[i])) { out[2] = pool[i]; pool[i] = null; break; }
  }
  return out;
}

// ===== STORAGE =====
const STORAGE_KEY = 'scan_etiquetas_v1';
const loadRecords = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } };
const saveRecords = r => localStorage.setItem(STORAGE_KEY, JSON.stringify(r));
let records = loadRecords();
updateCounter();

// ===== DOM =====
const $ = id => document.getElementById(id);
const video = $('video'), photoPreview = $('photo-preview'), frameGuide = $('frame-guide');
const nocam = $('nocam'), nocamMsg = $('nocam-msg'), btnStart = $('btn-start');
const btnImport = $('btn-import'), btnExitPhoto = $('btn-exit-photo'), btnOcr = $('btn-ocr');
const ocrProgress = $('ocr-progress'), fileInput = $('file-input'), logo = $('logo');

// ===== STATE =====
let detector = null, stream = null, detectLoopRunning = false;
let mode = 'camera', registerReady = false;

const SLOT_GRACE_MS = 2500;   // keep value visible after last detection
const MIN_CONFIDENCE = 2;     // consecutive frames required for camera source
const OCR_SUGGEST_AFTER_MS = 4000;

const slotState = {
  1: { value: null, source: null, confidence: 0, lastSeen: 0 },
  2: { value: null, source: null, confidence: 0, lastSeen: 0 },
  3: { value: null, source: null, confidence: 0, lastSeen: 0 }
};
let noBarcodeSince = Date.now();

// ===== CAMERA INIT =====
async function initCamera() {
  if (!('BarcodeDetector' in window)) {
    nocam.style.display = 'flex';
    nocamMsg.innerHTML = 'BarcodeDetector no soportado.<br>Usá Chrome o Edge en Android.<br><br>Podés usar IMPORTAR FOTO + OCR.';
    btnStart.style.display = 'none';
    return;
  }
  try {
    detector = new BarcodeDetector({
      formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf', 'codabar']
    });
  } catch (e) { nocam.style.display = 'flex'; nocamMsg.textContent = 'Error detector: ' + e.message; return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    nocam.style.display = 'none';
    startDetectLoop();
  } catch (e) {
    nocam.style.display = 'flex';
    nocamMsg.textContent = 'Sin cámara: ' + e.message + '. Usá IMPORTAR FOTO.';
  }
}

function startDetectLoop() {
  if (detectLoopRunning) return;
  detectLoopRunning = true;
  let busy = false;
  const tick = async () => {
    if (!detectLoopRunning) return;
    if (mode !== 'camera') { setTimeout(tick, 200); return; }
    if (busy) { requestAnimationFrame(tick); return; }
    busy = true;
    try {
      if (detector && video.readyState >= 2) {
        const results = await detector.detect(video);
        processLiveDetection(results.map(r => r.rawValue));
      }
    } catch {}
    busy = false;
    setTimeout(() => requestAnimationFrame(tick), 120);
  };
  tick();
}

// ===== STABILIZATION (per-slot grace + confidence) =====
function processLiveDetection(rawValues) {
  const classified = classifyByFormat(rawValues);
  const now = Date.now();
  for (const idx of [1, 2, 3]) {
    const v = classified[idx];
    if (v) {
      updateSlot(idx, v, 'cam');
    } else {
      const s = slotState[idx];
      if (s.value && s.source === 'cam' && (now - s.lastSeen) > SLOT_GRACE_MS) {
        clearSlot(idx);
      }
    }
  }
  evaluateReady();
  updateOcrSuggestion();
}

function updateSlot(idx, value, source) {
  const s = slotState[idx];
  const now = Date.now();
  if (s.value === value) s.confidence = Math.min(s.confidence + 1, 99);
  else { s.value = value; s.confidence = 1; }
  s.source = source;
  s.lastSeen = now;
  renderSlot(idx);
}

function clearSlot(idx) {
  slotState[idx] = { value: null, source: null, confidence: 0, lastSeen: 0 };
  renderSlot(idx);
}

function clearAllSlots() {
  [1, 2, 3].forEach(clearSlot);
  registerReady = false;
  noBarcodeSince = Date.now();
}

function renderSlot(idx) {
  const s = slotState[idx];
  const slot = $('slot-' + idx), val = $('val-' + idx), badge = $('badge-' + idx);
  slot.classList.remove('ok', 'warn', 'ocr');
  if (!s.value) { val.textContent = '—'; badge.textContent = ''; return; }
  val.textContent = s.value;
  const valid = validate(idx, s.value);
  if (s.source === 'ocr' || s.source === 'manual') {
    slot.classList.add('ocr');
    badge.textContent = s.source === 'ocr' ? 'OCR' : 'MANUAL';
  } else if (valid && s.confidence >= MIN_CONFIDENCE) {
    slot.classList.add('ok');
    badge.textContent = '✓';
  } else if (!valid) {
    slot.classList.add('warn');
    badge.textContent = 'FORMATO?';
  } else {
    slot.classList.add('warn');
    badge.textContent = '…';
  }
}

function evaluateReady() {
  const allValid = [1, 2, 3].every(idx => {
    const s = slotState[idx];
    if (!s.value || !validate(idx, s.value)) return false;
    if (s.source === 'cam' && s.confidence < MIN_CONFIDENCE) return false;
    return true;
  });
  setRegisterReady(allValid, allValid ? '✓ Listo · tap para registrar' : hintFromSlots());
}

function hintFromSlots() {
  const missing = [];
  for (const idx of [1, 2, 3]) {
    const s = slotState[idx];
    if (!s.value) missing.push(idx);
    else if (!validate(idx, s.value)) return `Slot ${String(idx).padStart(2,'0')}: formato inválido (tap EDIT)`;
  }
  if (missing.length === 3) return 'Esperando 3 códigos…';
  if (missing.length) return `Faltan: ${missing.map(i => String(i).padStart(2,'0')).join(', ')}`;
  return 'Validando…';
}

function setRegisterReady(ready, hint) {
  const btn = $('btn-register');
  if (ready && !registerReady && navigator.vibrate) navigator.vibrate(40);
  registerReady = ready;
  btn.disabled = !ready;
  btn.classList.toggle('ready', ready);
  $('register-hint').textContent = hint;
}

function updateOcrSuggestion() {
  if (mode !== 'camera') return;
  const allValid = [1,2,3].every(i => slotState[i].value && validate(i, slotState[i].value));
  if (allValid) { btnOcr.classList.remove('show'); noBarcodeSince = Date.now(); return; }
  if (Date.now() - noBarcodeSince > OCR_SUGGEST_AFTER_MS) btnOcr.classList.add('show');
}

// ===== PHOTO IMPORT =====
btnImport.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  fileInput.value = '';
  if (!detector) { showToast('Detector no disponible', true); return; }

  mode = 'photo';
  setModeIndicator('photo');
  btnExitPhoto.classList.add('show');
  btnOcr.classList.add('show');
  frameGuide.classList.add('hidden');

  const url = URL.createObjectURL(file);
  photoPreview.src = url;
  photoPreview.style.display = 'block';
  video.style.display = 'none';

  clearAllSlots();
  setRegisterReady(false, 'Procesando foto…');

  try {
    const img = new Image();
    img.src = url;
    await img.decode();
    const results = await detector.detect(img);
    const vals = results.map(r => r.rawValue);
    const classified = classifyByFormat(vals);
    let detected = 0;
    for (const idx of [1, 2, 3]) {
      if (classified[idx]) {
        updateSlot(idx, classified[idx], 'foto');
        slotState[idx].confidence = MIN_CONFIDENCE;
        detected++;
      }
    }
    evaluateReady();
    if (detected < 3) showToast(`Foto: ${detected}/3 barcodes. Probá OCR`, false, false, true);
  } catch (err) {
    showToast('Error leyendo foto: ' + err.message, true);
    setRegisterReady(false, 'Error procesando foto');
  }
});

btnExitPhoto.addEventListener('click', exitPhotoMode);

function exitPhotoMode() {
  mode = 'camera';
  setModeIndicator('camera');
  btnExitPhoto.classList.remove('show');
  btnOcr.classList.remove('show');
  frameGuide.classList.remove('hidden');
  photoPreview.style.display = 'none';
  video.style.display = 'block';
  if (photoPreview.src) URL.revokeObjectURL(photoPreview.src);
  photoPreview.src = '';
  clearAllSlots();
  evaluateReady();
  noBarcodeSince = Date.now();
}

function setModeIndicator(m) {
  logo.classList.remove('photo', 'ocr');
  if (m === 'photo') { logo.classList.add('photo'); logo.textContent = 'MODO · FOTO'; }
  else if (m === 'ocr') { logo.classList.add('ocr'); logo.textContent = 'MODO · OCR'; }
  else { logo.textContent = 'SCAN · ETIQUETAS'; }
}

// ===== OCR (Tesseract.js lazy-load) =====
let tesseractWorker = null, tesseractLoading = null;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve;
    s.onerror = () => reject(new Error('No se pudo cargar ' + src));
    document.head.appendChild(s);
  });
}

async function ensureTesseract(onProgress) {
  if (tesseractWorker) return tesseractWorker;
  if (tesseractLoading) return tesseractLoading;
  tesseractLoading = (async () => {
    if (!window.Tesseract) {
      onProgress?.('Descargando OCR…', 'Primera vez: ~3MB. Después queda en caché.');
      await loadScript('https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js');
    }
    onProgress?.('Inicializando OCR…', 'Preparando modelo');
    const worker = await window.Tesseract.createWorker('eng', 1, {
      logger: (m) => {
        if (m.status && onProgress) {
          const pct = m.progress ? Math.round(m.progress * 100) : null;
          const nice = m.status === 'recognizing text' ? 'Leyendo etiqueta…'
                     : m.status === 'loading language traineddata' ? 'Descargando idioma…'
                     : m.status === 'initializing api' ? 'Inicializando…'
                     : 'Preparando OCR…';
          onProgress(nice, pct !== null ? pct + '%' : m.status);
        }
      }
    });
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz /:.-,'
    });
    tesseractWorker = worker;
    return worker;
  })();
  try { return await tesseractLoading; } finally { tesseractLoading = null; }
}

function setOcrProgress(msg, sub) { $('ocr-msg').textContent = msg || ''; $('ocr-sub').textContent = sub || ''; }
function showOcrProgress(show) { ocrProgress.classList.toggle('show', show); }

btnOcr.addEventListener('click', runOcr);

async function runOcr() {
  showOcrProgress(true);
  setOcrProgress('Preparando…', '');
  const prevMode = mode;
  setModeIndicator('ocr');
  try {
    let source;
    if (prevMode === 'photo' && photoPreview.src) {
      source = photoPreview;
    } else {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      source = canvas;
    }
    const worker = await ensureTesseract(setOcrProgress);
    setOcrProgress('Leyendo etiqueta…', 'Analizando texto');
    const { data: { text } } = await worker.recognize(source);
    const parsed = parseLabelText(text);
    let found = 0;
    for (const idx of [1, 2, 3]) {
      if (parsed[idx]) {
        updateSlot(idx, parsed[idx], 'ocr');
        slotState[idx].confidence = MIN_CONFIDENCE;
        found++;
      }
    }
    evaluateReady();
    showOcrProgress(false);
    setModeIndicator(prevMode);
    if (found === 3) showToast('✓ OCR leyó 3 valores');
    else if (found > 0) showToast(`OCR: ${found}/3. Completá con EDIT`, false, false, true);
    else showToast('OCR no encontró valores. Usá EDIT', true);
  } catch (err) {
    console.error(err);
    showOcrProgress(false);
    setModeIndicator(prevMode);
    showToast('Error OCR: ' + (err.message || err), true);
  }
}

function parseLabelText(text) {
  const out = { 1: null, 2: null, 3: null };
  const upper = text.toUpperCase();
  // Slot 1: 9 + 6 dígitos
  const mProd = text.match(/\b9\d{6}\b/);
  if (mProd) out[1] = mProd[0];
  // Slot 2: after CANTIDAD keyword
  const qtyIdx = upper.search(/CANTIDAD/);
  if (qtyIdx >= 0) {
    const window = text.substring(qtyIdx, qtyIdx + 80);
    const m = window.match(/(\d{2,})/);
    if (m) out[2] = m[1];
  }
  // Slot 3: after OF/LOTE or LOTE keyword
  const lotIdx = upper.search(/OF\s*[\/\\]?\s*LOTE|OFLOTE|LOTE/);
  if (lotIdx >= 0) {
    const window = text.substring(lotIdx, lotIdx + 80);
    const m = window.match(/\b(\d{7}[A-Z]*)\b/);
    if (m) out[3] = m[1];
  }
  if (!out[3]) {
    const m = text.match(/\b(\d{7}[A-Z]+)\b/);
    if (m) out[3] = m[1];
  }
  return out;
}

// ===== MANUAL EDIT =====
const modalEdit = $('modal-edit');
let editingIdx = null;

document.querySelectorAll('.slot-edit').forEach(btn => {
  btn.addEventListener('click', (e) => { e.stopPropagation(); openEdit(parseInt(btn.dataset.idx)); });
});

function openEdit(idx) {
  editingIdx = idx;
  const v = VALIDATORS[idx];
  $('edit-title').textContent = `EDITAR ${String(idx).padStart(2,'0')} · ${v.label}`;
  $('edit-desc').textContent = `Valor del campo ${v.label}.`;
  $('edit-hint').textContent = `Formato esperado: ${v.hint} · Ej: ${v.sample}`;
  $('edit-input').value = slotState[idx].value || '';
  modalEdit.classList.add('show');
  setTimeout(() => $('edit-input').focus(), 100);
}
$('edit-cancel').addEventListener('click', () => { modalEdit.classList.remove('show'); editingIdx = null; });
$('edit-save').addEventListener('click', () => {
  const val = $('edit-input').value.trim();
  if (!val) { if (editingIdx !== null) clearSlot(editingIdx); }
  else {
    updateSlot(editingIdx, val, 'manual');
    slotState[editingIdx].confidence = MIN_CONFIDENCE;
  }
  modalEdit.classList.remove('show');
  editingIdx = null;
  evaluateReady();
});
$('edit-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('edit-save').click(); });

// ===== REGISTER =====
$('btn-register').addEventListener('click', () => {
  if (!registerReady) return;
  const priority = { manual: 4, ocr: 3, foto: 2, cam: 1 };
  let src = 'cam';
  for (const idx of [1, 2, 3]) {
    const s = slotState[idx].source;
    if ((priority[s] || 0) > (priority[src] || 0)) src = s;
  }
  const rec = {
    ts: new Date().toISOString(),
    b1: slotState[1].value, b2: slotState[2].value, b3: slotState[3].value,
    src
  };
  records.unshift(rec);
  saveRecords(records);
  updateCounter();
  if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
  showToast(`✓ REGISTRADO · ${rec.b1}`);
  if (mode === 'photo') exitPhotoMode();
  else {
    clearAllSlots();
    setRegisterReady(false, 'Esperando próxima etiqueta…');
  }
});

function updateCounter() { $('count').textContent = records.length; }

// ===== TOAST =====
let toastTimer = null;
function showToast(msg, isErr = false, isInfo = false, isWarn = false) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.remove('err', 'info', 'warn');
  if (isErr) t.classList.add('err');
  if (isInfo) t.classList.add('info');
  if (isWarn) t.classList.add('warn');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== HISTORY =====
const overlay = $('history-overlay');
$('btn-history').addEventListener('click', () => { renderHistory(); overlay.classList.add('open'); });
$('history-close').addEventListener('click', () => overlay.classList.remove('open'));

function renderHistory() {
  const list = $('history-list');
  if (!records.length) { list.innerHTML = '<div class="history-empty">Sin registros todavía</div>'; return; }
  list.innerHTML = records.map((r, i) => {
    const d = new Date(r.ts);
    const time = d.toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const srcClass = r.src || 'cam';
    const srcLabel = (r.src || 'cam').toUpperCase();
    return `
      <div class="history-item">
        <div class="history-item-data">
          <div><span class="tag">01</span>${esc(r.b1)}<span class="src ${srcClass}">${srcLabel}</span></div>
          <div><span class="tag">02</span>${esc(r.b2)}</div>
          <div><span class="tag">03</span>${esc(r.b3)}</div>
          <div class="history-item-time">${time}</div>
        </div>
        <button class="history-item-del" data-idx="${i}">✕</button>
      </div>`;
  }).join('');
  list.querySelectorAll('.history-item-del').forEach(b => b.addEventListener('click', () => {
    records.splice(parseInt(b.dataset.idx), 1);
    saveRecords(records); updateCounter(); renderHistory();
  }));
}
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ===== EXPORT =====
$('btn-export').addEventListener('click', () => {
  if (!records.length) { showToast('Sin registros para exportar', true); return; }
  const SEP = ';';
  const header = ['timestamp_iso','fecha','hora','producto_01','cantidad_02','of_lote_03','origen'].join(SEP);
  const rows = records.map(r => {
    const d = new Date(r.ts);
    return [r.ts, d.toLocaleDateString('es-AR'), d.toLocaleTimeString('es-AR'), r.b1, r.b2, r.b3, r.src || 'cam'].join(SEP);
  });
  const csv = '\ufeff' + [header, ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url; a.download = `scan_etiquetas_${stamp}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`✓ EXPORTADO ${records.length}`);
});

// ===== CLEAR =====
const modalClear = $('modal-clear');
$('btn-clear').addEventListener('click', () => {
  if (!records.length) { showToast('Sin registros para borrar', true); return; }
  $('modal-count').textContent = records.length;
  modalClear.classList.add('show');
});
$('modal-cancel').addEventListener('click', () => modalClear.classList.remove('show'));
$('modal-confirm').addEventListener('click', () => {
  records = []; saveRecords(records); updateCounter();
  modalClear.classList.remove('show');
  showToast('✓ HISTORIAL BORRADO');
});

// ===== LIFECYCLE =====
btnStart.addEventListener('click', initCamera);
window.addEventListener('load', initCamera);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) detectLoopRunning = false;
  else if (stream && !detectLoopRunning) startDetectLoop();
});

// Tick para evaluar OCR suggestion incluso cuando no hay detecciones
setInterval(updateOcrSuggestion, 500);
</script>
